<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giường ngủ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1><a href="index.html">Shop Nội Thất</a></h1>
    <p>Nội thất hiện đại cho mọi nhà</p>
  </header>

  <div class="brown-bar"></div>

  <div class="section-heading">
    <h1>GIƯỜNG NGỦ</h1>
    <div class="underline"></div>
  </div>

  <main>
    <div class="grid">
      <div class="product">
        <img src="images/giuong1.jpg" alt="Giường gỗ tự nhiên">
        <p>Giường gỗ tự nhiên</p>
        <p class="price">Giá: 5.000.000 VND</p>
        <a href="#" class="btn-message">Gửi tin nhắn</a>
      </div>

      <div class="product">
        <img src="images/giuong2.jpg" alt="Giường hiện đại cao cấp">
        <p>Giường hiện đại cao cấp</p>
        <p class="price">Giá: 6.500.000 VND</p>
        <a href="#" class="btn-message">Gửi tin nhắn</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Shop Nội Thất</p>
  </footer>
</body>
</html>
