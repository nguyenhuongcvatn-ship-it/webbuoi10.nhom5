<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sofa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1><a href="index.html">Shop Nội Thất</a></h1>
    <p>Nội thất hiện đại cho mọi nhà</p>
  </header>

  <div class="brown-bar"></div>

  <div class="section-heading">
    <h1>SOFA</h1>
    <div class="underline"></div>
  </div>

  <main id="layout">
    <div class="grid">
      <div class="product">
        <img src="images/sofa1.jpg" alt="Sofa vải hiện đại">
        <p>Sofa vải hiện đại</p>
        <p class="price">Giá: 6.000.000 VND</p>
        <a href="#" class="btn-message">Gửi tin nhắn</a>
      </div>

      <div class="product">
        <img src="images/sofa2.jpg" alt="Sofa da cao cấp">
        <p>Sofa da cao cấp</p>
        <p class="price">Giá: 8.500.000 VND</p>
        <a href="#" class="btn-message">Gửi tin nhắn</a>
      </div>

      <div class="product">
        <img src="images/sofa3.jpg" alt="Sofa góc chữ L chất lượng">
        <p>Sofa góc chữ L</p>
        <p class="price">Giá: 7.200.000 VND</p>
        <a href="#" class="btn-message">Gửi tin nhắn</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Shop Nội Thất</p>
  </footer>
</body>
</html>
